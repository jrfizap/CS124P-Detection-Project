<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CS124P Detection Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans text-gray-900 antialiased">
    <div class="min-h-screen w-full flex flex-col items-center bg-fixed bg-cover bg-center" 
         style="background-image: url('{{ url_for('static', filename='images/PawsBackground.png') }}'); background-color: #f3f4f6;">
        
        <div class="mt-8 mb-2"> 
            <img src="{{ url_for('static', filename='images/Logo.png') }}" 
                 alt="Logo" 
                 class="w-auto h-20 md:h-28 object-contain mx-auto"
                 onerror="this.style.display='none'"> </div>

        <div class="w-full flex-1 flex flex-col items-center">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
